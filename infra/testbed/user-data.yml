#cloud-config
# Paste this into Proxmox cloud-init user-data when creating the testbed VM.
# Replace the ssh_authorized_keys value with the contents of infra/testbed/kimi-testbed.pub

hostname: 2b2t-store-testbed
manage_etc_hosts: true

users:
  - name: kimi
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKhMb5yladgkb7PzlnDj6xfzGzIQEgZgC9xKjShw9fdq kimi-testbed@2b2t-store

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - tmux
  - screen
  - ca-certificates
  - gnupg
  - lsb-release
  - unzip
  - net-tools
  - jq
  - python3
  - python3-pip
  - python3-venv
  - openjdk-21-jdk
  - nodejs
  - npm

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker kimi
  - systemctl enable --now docker
  - curl -fsSL https://astral.sh/uv/install.sh | bash
  - mv /root/.local/bin/uv /usr/local/bin/uv || true
  - |
    su - kimi -c "cd /home/kimi && git config --global user.name 'shulker-mechanic' && git config --global user.email 'shulker-mechanic@users.noreply.github.com'"
  - |
    su - kimi -c "cd /home/kimi && git clone git@github-skeleton:Shulker-Shop/skeleton.git 2b2t-store || true"
  - echo "Testbed setup complete" > /home/kimi/setup-complete.txt

final_message: "2b2t Store testbed VM is ready. Rebooting now."
