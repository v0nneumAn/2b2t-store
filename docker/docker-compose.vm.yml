# Cloudflare Tunnel VM deployment override for 2b2t Store.
#
# Usage on the VM:
#   cd /path/to/2b2t-store/docker
#   docker compose -f docker-compose.yml -f docker-compose.vm.yml --env-file .env.vm up -d
#
# This exposes the shop through a Cloudflare tunnel. No public host ports are
# required because cloudflared runs inside the same Docker network and reaches
# the Nginx frontend directly at http://web:80.

services:
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: 2b2t-store-tunnel
    command: tunnel run --token ${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      backend:
        condition: service_healthy
