services:
  backend:
    build: ../backend
    container_name: store-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://store:${POSTGRES_PASSWORD}@postgres:5432/store
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-usd}
      - MIN_ORDER_USD=10.0
      - BOT_API_KEY=${BOT_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - DEMO_MODE=${DEMO_MODE:-false}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - ZENITH_WEB_API_URL=${ZENITH_WEB_API_URL:-}
      - ZENITH_WEB_API_TOKEN=${ZENITH_WEB_API_TOKEN:-}
      - DEBUG=false
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ../web
    container_name: store-web
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  discord-bot:
    build: ../discord-bot
    container_name: store-discord-bot
    environment:
      - BACKEND_URL=http://backend:8000
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - BOT_API_KEY=${BOT_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  delivery-bot:
    build: ../delivery-bot
    container_name: store-delivery-bot
    environment:
      - BACKEND_URL=http://backend:8000
      - BOT_API_KEY=${BOT_API_KEY}
      - DELIVERY_BOT_BOT_ID=${DELIVERY_BOT_BOT_ID:-delivery-alpha}
      - ZENITH_CONFIG_authentication_accountType=${DELIVERY_BOT_ACCOUNT_TYPE:-device_code_without_device_token}
      - ZENITH_CONFIG_authentication_username=${DELIVERY_BOT_USERNAME:-}
      - ZENITH_CONFIG_client_server_address=${MINECRAFT_SERVER:-connect.2b2t.org}
      - ZENITH_CONFIG_client_server_port=${MINECRAFT_PORT:-25565}
      - ZENITH_CONFIG_client_autoConnect=${DELIVERY_BOT_AUTO_CONNECT:-true}
      - ZENITH_CONFIG_server_bind_port=${DELIVERY_BOT_BIND_PORT:-25566}
      - ZENITH_MC_VERSION=${ZENITH_MC_VERSION:-1.21.4}
      - ZENITH_PLATFORM=${ZENITH_PLATFORM:-java}
      - ZENITH_DISCORD_DISABLED=true
    volumes:
      - delivery-bot-config:/zenith/config
      - ../delivery-bot/config/delivery-zenith.json:/zenith/config/delivery-zenith.json:ro
    depends_on:
      backend:
        condition: service_healthy
      paper:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    container_name: store-postgres
    environment:
      - POSTGRES_USER=store
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=store
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: store-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  paper:
    image: eclipse-temurin:21-jre
    container_name: store-paper
    working_dir: /paper
    volumes:
      - ../paper-server/server:/paper
    ports:
      - "25565:25565"
    command: ["./start.sh"]
    environment:
      EULA: "true"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat < /dev/null > /dev/tcp/localhost/25565'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
  redis-data:
  delivery-bot-config:
