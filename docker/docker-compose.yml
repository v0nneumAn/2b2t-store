version: "3.8"

services:
  backend:
    build: ../backend
    container_name: store-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://store:store@postgres:5432/store
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-usd}
      - MIN_ORDER_USD=10.0
      - BOT_API_KEY=change-me-in-production
    volumes:
      - backend-data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build: ../web
    container_name: store-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  discord-bot:
    build: ../discord-bot
    container_name: store-discord-bot
    environment:
      - BACKEND_URL=http://backend:8000
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: store-postgres
    environment:
      - POSTGRES_USER=store
      - POSTGRES_PASSWORD=store
      - POSTGRES_DB=store
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: store-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
  redis-data:
