version: "3.8"

services:
  backend:
    build: ../backend
    container_name: store-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://store:${POSTGRES_PASSWORD}@postgres:5432/store
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-usd}
      - MIN_ORDER_USD=10.0
      - BOT_API_KEY=${BOT_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - ZENITH_WEB_API_URL=${ZENITH_WEB_API_URL:-}
      - ZENITH_WEB_API_TOKEN=${ZENITH_WEB_API_TOKEN:-}
      - DEBUG=false
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ../web
    container_name: store-web
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  discord-bot:
    build: ../discord-bot
    container_name: store-discord-bot
    environment:
      - BACKEND_URL=http://backend:8000
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - BOT_API_KEY=${BOT_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: store-postgres
    environment:
      - POSTGRES_USER=store
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=store
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: store-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
  redis-data:
